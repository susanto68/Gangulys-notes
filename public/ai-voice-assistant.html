<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Assistant</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#66a6ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sir Ganguly">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: auto; font-family: 'Segoe UI', Tahoma, Verdana, sans-serif; background: linear-gradient(135deg, #a5b4fc, #f0f9ff); color: #1e293b; }
    body { display: flex; justify-content: center; align-items: flex-start; padding: 16px; }

    .app { display: flex; flex-direction: column; width: 100%; max-width: 1000px; gap: 16px; }
    @media (min-width: 769px) { .app { flex-direction: row; } }

    .container, .view2 { background: #fff; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); padding: 16px; overflow: auto; }
    .container { flex: 2; display: flex; flex-direction: column; text-align: center; }
    .view2 { flex: 1; display: none; flex-direction: column; }
    .view2.active { display: flex; }

    h1 { font-size: 1.5rem; margin-bottom:12px; display:flex; justify-content:center; align-items:center; gap:6px; }
    h1 img { width:28px; }

    #avatar { width:100px; height:100px; margin:0 auto; border-radius:50%; transition:transform .2s ease; }

    .whatsapp-feedback { margin: 12px 0; }
    .whatsapp-btn { display: inline-flex; align-items: center; gap: 6px; background: #25D366; color: white; padding: 8px 16px; border-radius: 20px; text-decoration: none; font-weight: 600; font-size: 14px; transition: all 0.3s ease; box-shadow: 0 2px 8px rgba(37, 211, 102, 0.3); }
    .whatsapp-btn:hover { background: #128C7E; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4); }
    .whatsapp-btn i { font-size: 16px; }

    @keyframes float {0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);} }

    #responseBox { background:#f1f5f9; padding:12px; border-radius:12px; margin-top:12px; font-size:.9rem; min-height:60px; text-align:left; line-height:1.4; white-space:pre-wrap; flex-grow:1; }
    #status { margin-top:8px; font-size:.8rem; color:#64748b; min-height:1.2em; }
    .question-form { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
    #questionInput { width: 100%; min-height: 78px; resize: vertical; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font: inherit; line-height: 1.4; }
    #questionInput:focus { outline: 2px solid #93c5fd; border-color: #3b82f6; }
    .form-actions { display:flex; gap:8px; }
    #sendBtn { background:#16a34a; color:#fff; }
    #sendBtn:hover:not(:disabled) { background:#15803d; }

    #controls { margin-top:12px; display:flex; justify-content:center; gap:8px; }
    button { flex:1; padding:10px; font-size:.9rem; border:none; border-radius:8px; cursor:pointer; display:flex; justify-content:center; align-items:center; gap:6px; transition:background .2s; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    #talkBtn { background:#3b82f6; color:#fff; }
    #talkBtn:hover:not(:disabled) { background:#2563eb; }
    #stopBtn { background:#ef4444; color:#fff; }
    #stopBtn:hover:not(:disabled) { background:#dc2626; }

    .view2 h2 { margin-bottom:8px; font-size:1.2rem; color:#1e40af; display:flex; align-items:center; gap:6px; }
    .snippet, .qa { background:#f8fafc; padding:12px; border-radius:8px; margin-top:8px; overflow-x:auto; font-family:'Courier New', monospace; font-size:.85rem; white-space:pre-wrap; }
    .copyBtn { margin-top:6px; align-self:flex-end; padding:6px 10px; font-size:.8rem; background:#10b981; color:#fff; border:none; border-radius:6px; cursor:pointer; display:flex; align-items:center; gap:4px; }
    .copyBtn:hover { background:#059669; }

    @media (max-width:768px) {
      h1 { font-size:1.25rem; }
      #avatar { width:80px; height:80px; }
      #responseBox, .snippet, .qa { font-size:.85rem; }
      button { font-size:.85rem; padding:8px; }
      .view2 { margin-top:16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="container">
      <h1>🎤 AI Voice Assistant <img src="/assets/icons/icon-72x72.png" alt="Bot"/></h1>
      <div class="whatsapp-feedback">
        <a href="https://wa.me/919835379900?text=Hi! I have feedback about the AI Assistant." class="whatsapp-btn" target="_blank" rel="noopener noreferrer">
          <i class="fab fa-whatsapp"></i> Share Feedback via WhatsApp
        </a>
      </div>
      <img id="avatar" src="sirganguly.png" alt="Avatar" />
      <form class="question-form" id="questionForm">
        <textarea id="questionInput" placeholder="Type your question here. You can ask computer theory, Java, Python, programming errors, or study questions."></textarea>
        <div class="form-actions">
          <button id="sendBtn" type="submit">Send Question</button>
        </div>
      </form>
      <div id="responseBox">Ask me anything about computer science…</div>
      <div id="status"></div>
      <div id="controls">
        <button id="talkBtn" disabled><img src="/assets/icons/icon-16x16.png" alt="Talk" />Talk</button>
        <button id="stopBtn" disabled><img src="/assets/icons/icon-32x32.png" alt="Stop" />Stop</button>
      </div>
    </div>
    <div class="view2" id="view2"></div>
  </div>

  <script>
    const VOICE_API = '/api/voice'; // Server proxy for Gemini + OpenAI TTS
    const VOICE_AUDIO_API = '/api/voice-audio';
    const talkBtn = document.getElementById('talkBtn');
    const stopBtn = document.getElementById('stopBtn');
    const sendBtn = document.getElementById('sendBtn');
    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const statusEl = document.getElementById('status');
    const responseBox = document.getElementById('responseBox');
    const avatar = document.getElementById('avatar');
    const view2 = document.getElementById('view2');

    let recognition, isListening = false;
    let isSpeaking = false;
    let audio = null;

    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        statusEl.textContent = 'Speech Recognition not supported in this browser. Please use Chrome or Edge.';
        talkBtn.disabled = true;
        stopBtn.disabled = true;
        return;
      }

      recognition = new SR();
      recognition.lang = 'en-IN';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      // Enable Talk button now that recognition is available
      talkBtn.disabled = false;
      recognition.onstart = () => { isListening = true; statusEl.textContent = '🎧 Listening…'; talkBtn.disabled = true; stopBtn.disabled = false; };
      recognition.onresult = async e => {
        stopPlayback();
        const transcript = e.results[0][0].transcript;
        questionInput.value = transcript;
        askQuestion(transcript);
      };
      recognition.onerror = e => { statusEl.textContent = 'Error: ' + e.error; cleanup(); };
      recognition.onend = () => { isListening = false; if (!isSpeaking) talkBtn.disabled = false; stopBtn.disabled = true; };
    }

    async function askQuestion(question) {
      const prompt = String(question || '').trim();
      if (!prompt) {
        statusEl.textContent = 'Please type or speak a question first.';
        return;
      }

      stopPlayback();
      cleanupView2();
      responseBox.textContent = prompt;
      statusEl.textContent = 'Thinking...';
      sendBtn.disabled = true;
      talkBtn.disabled = true;

      try {
        const res = await fetch(VOICE_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question: prompt, voice: 'alloy', includeAudio: false })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Server error');

        const reply = data.reply || 'I received your question, but I could not prepare a full answer. Please try again.';
        processReply(reply);
        statusEl.textContent = 'Complete answer is ready. Preparing voice...';
        requestVoice(reply);
      } catch (err) {
        processReply(`Question:
${prompt}
Answer:
I could not connect to the AI server right now. Please check your internet connection and try again. If the problem continues, type a shorter question and send again.`);
        statusEl.textContent = 'Temporary server problem. Please try again.';
      } finally {
        sendBtn.disabled = false;
        if (!isListening && !isSpeaking) talkBtn.disabled = !recognition;
      }
    }

    async function requestVoice(reply) {
      try {
        const res = await fetch(VOICE_AUDIO_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: reply, voice: 'alloy' })
        });
        const data = await res.json().catch(() => ({}));
        if (res.ok && data.audioBase64) {
          playBase64(data.audioBase64, data.audioMimeType || 'audio/mpeg');
        } else {
          statusEl.textContent = 'Complete answer is ready. Audio is temporarily unavailable.';
        }
      } catch (err) {
        statusEl.textContent = 'Complete answer is ready. Audio is temporarily unavailable.';
      }
    }

    function processReply(reply) {
      // detect code blocks
      const codeMatch = reply.match(/```([\s\S]*?)```/);
      if (codeMatch) {
        const code = codeMatch[1].trim();
        showSnippet(code);
        responseBox.textContent = reply.replace(codeMatch[0], '').trim();
      } else {
        responseBox.textContent = reply;
      }
    }

    function showSnippet(code) {
      view2.innerHTML = `<h2>Code Snippet</h2><div class="snippet">${escapeHtml(code)}</div><button class="copyBtn">Copy Code</button>`;
      view2.querySelector('.copyBtn').onclick = () => navigator.clipboard.writeText(code);
      view2.classList.add('active');
    }

    function showQA(question, answer) {
      view2.innerHTML = `<h2>Q & A</h2><div class="qa"><strong>${escapeHtml(question)}</strong><br>${escapeHtml(answer)}</div>`;
      view2.classList.add('active');
    }

    function cleanupView2() { view2.innerHTML = ''; view2.classList.remove('active'); }

    function playBase64(b64, mimeType) {
      stopPlayback();
      const src = `data:${mimeType || 'audio/mpeg'};base64,${b64}`;
      audio = new Audio(src);
      isSpeaking = true; statusEl.textContent = '🔊 Speaking…'; stopBtn.disabled = false; avatar.style.animation = 'float 1s ease-in-out infinite';
      audio.onended = () => { isSpeaking = false; avatar.style.animation = ''; statusEl.textContent = ''; stopBtn.disabled = true; talkBtn.disabled = false; };
      audio.onerror = () => { isSpeaking = false; avatar.style.animation = ''; statusEl.textContent = ''; stopBtn.disabled = true; talkBtn.disabled = false; };
      audio.play().catch(() => { isSpeaking = false; avatar.style.animation = ''; statusEl.textContent = ''; });
    }

    function stopPlayback() {
      if (audio) {
        try { audio.pause(); } catch {}
        audio = null;
      }
      isSpeaking = false; avatar.style.animation = ''; statusEl.textContent = ''; stopBtn.disabled = true; if (!isListening) talkBtn.disabled = false;
    }

    function cleanup() {
      if (isListening && recognition) recognition.stop();
      stopPlayback();
    }

    function escapeHtml(str) {
      return (str || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
    }

    // initial setup and greeting
    initRecognition();
    window.addEventListener('load', () => {
      responseBox.textContent = 'Hello I am Sir Ganguly. Welcome to my AI Avatar Experiment. Feel free to learn new things with me.';
    });
    questionForm.onsubmit = event => {
      event.preventDefault();
      askQuestion(questionInput.value);
    };
    talkBtn.onclick = () => { cleanup(); recognition.start(); };
    stopBtn.onclick = () => { stopPlayback(); if (isListening) recognition.stop(); };
  </script>
</body>
</html>
