<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Voice Assistant</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#66a6ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Sir Ganguly">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100%; font-family: "Segoe UI", Tahoma, Verdana, sans-serif; background: linear-gradient(135deg, #dbeafe, #f8fafc); color: #172033; }
    body { display: flex; justify-content: center; align-items: flex-start; padding: 16px; }
    .app { display: grid; width: 100%; max-width: 1040px; grid-template-columns: minmax(0, 1fr); gap: 16px; }
    @media (min-width: 820px) { .app { grid-template-columns: minmax(0, 2fr) minmax(260px, 1fr); } }
    .container, .view2 { background: rgba(255,255,255,.94); border: 1px solid rgba(148,163,184,.28); border-radius: 14px; box-shadow: 0 12px 30px rgba(15,23,42,.1); padding: 16px; }
    .container { display: flex; flex-direction: column; text-align: center; min-height: calc(100vh - 32px); }
    .view2 { display: none; flex-direction: column; }
    .view2.active { display: flex; }
    h1 { font-size: 1.45rem; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; }
    h1 img { width: 28px; height: 28px; }
    .whatsapp-feedback { margin: 6px 0 12px; }
    .whatsapp-btn { display: inline-flex; align-items: center; gap: 6px; background: #16a34a; color: white; padding: 8px 15px; border-radius: 20px; text-decoration: none; font-weight: 650; font-size: 14px; box-shadow: 0 3px 10px rgba(22,163,74,.25); }
    .avatar-wrap { position: relative; width: 116px; height: 116px; margin: 0 auto 8px; display: grid; place-items: center; }
    #avatar { width: 104px; height: 104px; border-radius: 50%; transition: transform .18s ease, box-shadow .18s ease; animation: breathe 4s ease-in-out infinite; box-shadow: 0 0 0 5px #eef6ff; }
    .mouth { position: absolute; left: 50%; bottom: 32px; width: 18px; height: 5px; background: #1f2937; border-radius: 999px; transform: translateX(-50%) scaleY(.7); opacity: .8; }
    .eye-blink { position: absolute; inset: 0; border-radius: 50%; pointer-events: none; }
    .eye-blink::before, .eye-blink::after { content: ""; position: absolute; top: 42px; width: 13px; height: 2px; background: rgba(15,23,42,.85); border-radius: 999px; opacity: 0; animation: blink 5s infinite; }
    .eye-blink::before { left: 37px; }
    .eye-blink::after { right: 37px; }
    .state-listening #avatar { box-shadow: 0 0 0 5px #dbeafe, 0 0 0 12px rgba(59,130,246,.12); }
    .state-thinking #avatar { animation: breathe 2s ease-in-out infinite, nod 1.5s ease-in-out infinite; }
    .state-speaking #avatar { animation: speakMove .7s ease-in-out infinite; box-shadow: 0 0 0 5px #dcfce7, 0 0 0 14px rgba(22,163,74,.16); }
    .state-speaking .mouth { animation: mouthTalk .18s ease-in-out infinite alternate; }
    @keyframes breathe { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-3px) scale(1.015);} }
    @keyframes nod { 0%,100%{transform:rotate(0deg);} 50%{transform:rotate(1.5deg);} }
    @keyframes speakMove { 0%,100%{transform:translateY(0) scale(1.01);} 50%{transform:translateY(-4px) scale(1.03);} }
    @keyframes mouthTalk { from{height:4px; width:16px;} to{height:13px; width:15px;} }
    @keyframes blink { 0%, 92%, 100% { opacity: 0; transform: scaleY(1); } 94%, 96% { opacity: 1; transform: scaleY(2); } }
    .question-form { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    #questionInput { width: 100%; min-height: 80px; resize: vertical; border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; font: inherit; line-height: 1.45; background: #fff; }
    #questionInput:focus { outline: 2px solid #93c5fd; border-color: #2563eb; }
    .form-actions, #controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #controls { margin-top: 10px; grid-template-columns: 1fr 1fr 1fr 1fr; }
    button { min-height: 42px; padding: 9px 10px; font-size: .9rem; border: none; border-radius: 9px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 7px; transition: transform .16s ease, background .16s ease, opacity .16s ease; font-weight: 700; }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    #sendBtn { background: #16a34a; color: #fff; }
    #talkBtn { background: #2563eb; color: #fff; }
    #readAgainBtn { background: #7c3aed; color: #fff; }
    #stopBtn { background: #dc2626; color: #fff; }
    #muteBtn { background: #475569; color: #fff; }
    .mic-dot { width: 10px; height: 10px; border-radius: 999px; background: currentColor; opacity: .9; }
    .state-listening .mic-dot { animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(.8); opacity: .5; } 50% { transform: scale(1.25); opacity: 1; } }
    #responseBox { background:#f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; margin-top: 12px; font-size: .92rem; min-height: 128px; text-align: left; line-height: 1.48; white-space: pre-wrap; flex-grow: 1; overflow: auto; }
    #status { margin-top: 9px; font-size: .84rem; color:#526179; min-height: 1.35em; font-weight: 650; }
    .thinking-dots::after { content: ""; animation: dots 1.1s steps(4, end) infinite; }
    @keyframes dots { 0%{content:"";} 25%{content:".";} 50%{content:"..";} 75%,100%{content:"...";} }
    .sound-bars { display: none; align-items: end; justify-content: center; gap: 3px; height: 22px; margin-top: 6px; }
    .sound-bars span { width: 4px; height: 8px; border-radius: 99px; background: #2563eb; animation: wave .6s ease-in-out infinite alternate; }
    .sound-bars span:nth-child(2) { animation-delay: .12s; }
    .sound-bars span:nth-child(3) { animation-delay: .24s; }
    .sound-bars span:nth-child(4) { animation-delay: .36s; }
    .state-speaking .sound-bars { display: flex; }
    @keyframes wave { from { height: 6px; opacity:.55; } to { height: 21px; opacity:1; } }
    .view2 h2 { margin-bottom: 8px; font-size: 1.12rem; color: #1e40af; }
    .snippet { background:#0f172a; color:#e2e8f0; padding:12px; border-radius:8px; margin-top:8px; overflow-x:auto; font-family: Consolas, "Courier New", monospace; font-size:.85rem; white-space:pre; line-height: 1.5; }
    .code-keyword { color:#93c5fd; font-weight:700; }
    .code-string { color:#86efac; }
    .code-comment { color:#94a3b8; font-style:italic; }
    .code-number { color:#fbbf24; }
    .code-meta { color:#64748b; font-size:.78rem; margin-top:4px; text-align:left; }
    .copyBtn { margin-top:8px; align-self:flex-end; padding:7px 10px; font-size:.8rem; background:#0f766e; color:#fff; border:none; border-radius:7px; }
    @media (max-width: 768px) {
      body { padding: 10px; }
      .container { min-height: calc(100vh - 20px); padding: 12px; }
      h1 { font-size: 1.22rem; }
      .avatar-wrap { width: 98px; height: 98px; }
      #avatar { width: 88px; height: 88px; }
      #responseBox, .snippet { font-size: .86rem; }
      #controls { grid-template-columns: 1fr; }
      .form-actions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="container">
      <h1>AI Voice Assistant <img src="/assets/icons/icon-72x72.png" alt="Bot"/></h1>
      <div class="whatsapp-feedback">
        <a href="https://wa.me/919835379900?text=Hi! I have feedback about the AI Assistant." class="whatsapp-btn" target="_blank" rel="noopener noreferrer">Share Feedback via WhatsApp</a>
      </div>
      <div class="avatar-wrap" aria-hidden="true">
        <img id="avatar" src="sirganguly.png" alt="Sir Ganguly Avatar" />
        <span class="eye-blink"></span>
        <span class="mouth"></span>
      </div>
      <form class="question-form" id="questionForm">
        <textarea id="questionInput" placeholder="Type your question here. You can ask computer theory, Java, Python, programming errors, or study questions."></textarea>
        <div class="form-actions">
          <button id="sendBtn" type="submit">Send Question to Sir Ganguly AI</button>
        </div>
      </form>
      <div id="responseBox">Hello I am Sir Ganguly. Ask me anything about computer science.</div>
      <div class="sound-bars" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
      <div id="status">Ready.</div>
      <div id="controls">
        <button id="talkBtn" type="button" disabled><span class="mic-dot"></span>Press/Click this button and ask any question</button>
        <button id="readAgainBtn" type="button">Read Again</button>
        <button id="stopBtn" type="button" disabled>Stop</button>
        <button id="muteBtn" type="button">Mute</button>
      </div>
    </div>
    <div class="view2" id="view2"></div>
  </div>

  <script>
    const VOICE_STREAM_API = '/api/voice-stream';
    const VOICE_API = '/api/voice';
    const VOICE_AUDIO_API = '/api/voice-audio';
    const GREETING_TEXT = 'Hello, I am Sir Ganguly. Welcome to my AI learning platform. Feel free to ask your questions.';
    const LOCAL_CACHE_KEY = 'sirGangulyAiTeacherCache-v8-avatar-logic';
    const HISTORY_KEY = 'sirGangulyConversationHistory-v8-avatar-logic';
    const SESSION_KEY = 'sirGangulyAiSessionId-v8-avatar-logic';

    const app = document.getElementById('app');
    const talkBtn = document.getElementById('talkBtn');
    const readAgainBtn = document.getElementById('readAgainBtn');
    const stopBtn = document.getElementById('stopBtn');
    const muteBtn = document.getElementById('muteBtn');
    const sendBtn = document.getElementById('sendBtn');
    const questionForm = document.getElementById('questionForm');
    const questionInput = document.getElementById('questionInput');
    const statusEl = document.getElementById('status');
    const responseBox = document.getElementById('responseBox');
    const view2 = document.getElementById('view2');

    let recognition = null;
    let isListening = false;
    let isSpeaking = false;
    let muted = localStorage.getItem('sirGangulyMuted') === 'true';
    let audio = null;
    let answerController = null;
    let currentRequestId = 0;
    let lastReadableAnswer = '';
    const pendingAudio = {};
    const answerReady = {};
    const quickAudioFailed = {};
    let localCache = loadJson(LOCAL_CACHE_KEY, []);
    let conversationHistory = loadJson(HISTORY_KEY, []);
    let sessionId = localStorage.getItem(SESSION_KEY);
    if (!sessionId) {
      sessionId = `session-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      localStorage.setItem(SESSION_KEY, sessionId);
    }

    function logEvent(name, detail) {
      console.log(`[SirGangulyAI] ${name}`, detail || '');
    }

    function setState(state, message) {
      app.classList.remove('state-listening', 'state-thinking', 'state-speaking');
      if (state) app.classList.add(`state-${state}`);
      statusEl.classList.toggle('thinking-dots', state === 'thinking');
      if (message) statusEl.textContent = message;
    }

    function updateButtons() {
      sendBtn.disabled = false;
      talkBtn.disabled = !recognition || isListening || isSpeaking;
      stopBtn.disabled = !isListening && !isSpeaking;
      readAgainBtn.disabled = isListening || isSpeaking || !lastReadableAnswer.trim();
      muteBtn.textContent = muted ? 'Unmute' : 'Mute';
    }

    function loadJson(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (error) {
        logEvent('storage-error', error.message);
      }
    }

    function normalizeQuestion(question) {
      return String(question || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s+#.]/g, ' ')
        .replace(/\b(what|is|are|the|a|an|define|explain|please|tell|me|about|briefly|detail|detailed)\b/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function exactTopicPhrase(question) {
      const normalized = normalizeQuestion(question);
      const knownPhrases = [
        'selection sort',
        'bubble sort',
        'insertion sort',
        'linear search',
        'binary search',
        'prime number',
        'palindrome',
        'fibonacci',
        'factorial',
        'inheritance',
        'polymorphism',
        'encapsulation',
        'abstraction',
        'constructor',
        'recursion',
        'array',
        'loop',
        'variable',
        'algorithm',
        'cpu',
        'ram',
        'rom'
      ];
      return knownPhrases.find((phrase) => normalized.includes(phrase)) || '';
    }

    function similarity(a, b) {
      const left = normalizeQuestion(a).split(' ').filter(Boolean);
      const right = normalizeQuestion(b).split(' ').filter(Boolean);
      if (!left.length || !right.length) return 0;
      const rightSet = new Set(right);
      const common = left.filter((token) => rightSet.has(token)).length;
      return common / Math.max(left.length, right.length);
    }

    function isGenericBadAnswer(answer) {
      return /here is a simple way to understand it|identify the main term|please send the topic name/i.test(String(answer || ''));
    }

    function isRelevantAnswer(question, answer) {
      const text = String(answer || '').toLowerCase();
      if (!answer || answer.length < 80 || isGenericBadAnswer(answer)) return false;
      const phrase = exactTopicPhrase(question);
      if (phrase && !text.includes(phrase)) return false;
      if (/selection\s*sort/i.test(question) && /bubble\s*sort/i.test(text)) return false;
      if (/bubble\s*sort/i.test(question) && /selection\s*sort/i.test(text)) return false;
      if (/selection\s*sort/i.test(question)) return /selection sort|minimum|smallest|select/.test(text);
      if (/bubble\s*sort/i.test(question)) return /bubble sort|adjacent|swap|sort/.test(text);
      const terms = normalizeQuestion(question).split(' ').filter((term) => term.length > 2);
      if (!terms.length) return true;
      const matches = terms.filter((term) => text.includes(term)).length;
      return matches >= Math.min(2, terms.length);
    }

    function canUseCachedAnswer(question, cachedQuestion, cachedAnswer, score) {
      if (!isRelevantAnswer(question, cachedAnswer)) return false;
      const requestedPhrase = exactTopicPhrase(question);
      const cachedPhrase = exactTopicPhrase(cachedQuestion || cachedAnswer);
      if (requestedPhrase || cachedPhrase) return requestedPhrase === cachedPhrase;
      return score >= 0.9;
    }

    function findLocalAnswer(question) {
      let best = null;
      localCache = localCache.filter((entry) => Date.now() - entry.timestamp < 1000 * 60 * 60 * 24 * 14);
      localCache.forEach((entry) => {
        const score = normalizeQuestion(question) === entry.normalizedQuestion ? 1 : similarity(question, entry.question);
        if (canUseCachedAnswer(question, entry.question, entry.answer, score) && (!best || score > best.score)) best = { ...entry, score };
      });
      localCache = localCache.filter((entry) => !isGenericBadAnswer(entry.answer));
      saveJson(LOCAL_CACHE_KEY, localCache);
      return best;
    }

    function rememberAnswer(question, answer, source) {
      const parsed = parseAnswer(answer);
      lastReadableAnswer = parsed.explanation || answer;
      const cacheEntry = {
        question,
        normalizedQuestion: normalizeQuestion(question),
        answer,
        explanation: parsed.explanation,
        code: parsed.code,
        language: parsed.language,
        source,
        timestamp: Date.now()
      };
      localCache = [cacheEntry, ...localCache.filter((item) => item.normalizedQuestion !== cacheEntry.normalizedQuestion)].slice(0, 80);
      conversationHistory = [{ question, answer, source, timestamp: Date.now() }, ...conversationHistory].slice(0, 60);
      saveJson(LOCAL_CACHE_KEY, localCache);
      saveJson(HISTORY_KEY, conversationHistory);
    }

    function localTeachingAnswerClient(question) {
      const q = String(question || '').toLowerCase();
      if (/\bpython\b/.test(q) && /\b(add|sum)\b/.test(q) && /\bdigits?\b/.test(q)) {
        return 'To add all the digits of any number in Python, we can repeatedly take the last digit using modulus `% 10`, add it to a sum, and then remove the last digit using integer division `// 10`. This continues until the number becomes 0. For example, if the number is 456, the sum is 4 + 5 + 6 = 15.\n\n' +
'```python\n' +
'num = int(input("Enter any number: "))\n' +
'sum_digits = 0\n' +
'\n' +
'num = abs(num)\n' +
'\n' +
'while num > 0:\n' +
'    digit = num % 10\n' +
'    sum_digits = sum_digits + digit\n' +
'    num = num // 10\n' +
'\n' +
'print("Sum of digits =", sum_digits)\n' +
'```\n\n' +
'Example:\n' +
'Input: 456\n' +
'Output: Sum of digits = 15\n\n' +
'Keep learning, you are doing great!';
      }
      return '';
    }

    function initRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        setState('', 'Microphone is not supported here. Please type your question and press Send.');
        updateButtons();
        return;
      }

      recognition = new SR();
      recognition.lang = 'en-IN';
      recognition.interimResults = true;
      recognition.continuous = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        logEvent('microphone-start');
        setState('listening', 'Listening...');
        updateButtons();
      };

      recognition.onresult = (event) => {
        let finalText = '';
        let interimText = '';
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const text = event.results[i][0].transcript;
          if (event.results[i].isFinal) finalText += text;
          else interimText += text;
        }
        questionInput.value = (finalText || interimText || questionInput.value).trim();
        if (finalText.trim()) askQuestion(finalText.trim());
      };

      recognition.onerror = (event) => {
        logEvent('microphone-error', event.error);
        isListening = false;
        const message = event.error === 'not-allowed'
          ? 'Microphone permission was blocked. Please allow microphone or type your question.'
          : 'Microphone stopped. Please try again or type your question.';
        setState('', message);
        updateButtons();
      };

      recognition.onend = () => {
        logEvent('microphone-end');
        isListening = false;
        if (!isSpeaking) setState('', 'Ready.');
        updateButtons();
      };

      talkBtn.disabled = false;
      updateButtons();
    }

    async function askQuestion(question) {
      const prompt = String(question || '').trim();
      if (!prompt) {
        setState('', 'Please type or speak a question first.');
        return;
      }

      stopPlayback();
      stopCurrentAnswer();
      cleanupView2();

      const requestId = ++currentRequestId;
      responseBox.textContent = '';
      questionInput.value = prompt;
      sendBtn.disabled = true;
      talkBtn.disabled = true;
      setState('thinking', 'Sir Ganguly is thinking');
      logEvent('question-submit', { requestId, length: prompt.length });

      logEvent('browser-cache-bypassed', 'AI provider will answer first');

      try {
        const reply = await streamAnswer(prompt, requestId);
        if (requestId !== currentRequestId) return;
        const finalReply = reply.trim() || await fetchNormalAnswer(prompt);
        processReply(finalReply);
        rememberAnswer(prompt, finalReply, 'server');
        answerReady[requestId] = true;
        logEvent('answer-ready', { requestId, length: finalReply.length });

        if (muted) {
          setState('', 'Answer is ready. Voice is muted.');
        } else {
          setState('speaking', 'Speaking...');
          if (!speakWithBrowserVoice(finalReply)) {
            setState('thinking', 'Preparing voice');
            requestAnswerVoice(finalReply, requestId);
          }
        }
      } catch (error) {
        logEvent('answer-error', error.message);
        const fallback = localTeachingAnswerClient(prompt);
        if (fallback) {
          processReply(fallback);
          rememberAnswer(prompt, fallback, 'local-browser-fallback');
          answerReady[requestId] = true;
          if (!muted && !speakWithBrowserVoice(fallback)) {
            requestAnswerVoice(fallback, requestId);
          }
          setState('', muted ? 'Answer is ready. Voice is muted.' : 'Answer is ready.');
        } else {
          const message = 'The answer service is starting. Please press Send again in a few seconds.';
          processReply(message);
          setState('', message);
        }
      } finally {
        sendBtn.disabled = false;
        updateButtons();
      }
    }

    async function streamAnswer(prompt, requestId) {
      answerController = new AbortController();
      const response = await fetch(VOICE_STREAM_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: prompt, sessionId }),
        signal: answerController.signal
      });

      if (!response.ok || !response.body) throw new Error('Stream failed');
      const responseSource = response.headers.get('X-AI-Source') || 'server';
      logEvent('answer-source', responseSource);

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let reply = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        if (requestId !== currentRequestId) {
          try { reader.cancel(); } catch {}
          return reply;
        }
        const chunk = decoder.decode(value, { stream: true });
        reply += chunk;
        responseBox.textContent = reply;
        responseBox.scrollTop = responseBox.scrollHeight;
      }

      return reply;
    }

    async function fetchNormalAnswer(prompt) {
      const response = await fetch(VOICE_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: prompt, voice: 'alloy', includeAudio: false, sessionId })
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || 'Server error');
      return data.reply || '';
    }

    async function requestQuestionVoice(question, requestId) {
      try {
        const response = await fetch(VOICE_AUDIO_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, voice: 'alloy' })
        });
        const data = await response.json().catch(() => ({}));
        if (requestId !== currentRequestId || muted) return;
        if (response.ok && data.audioBase64) {
          if (answerReady[requestId]) {
            playBase64(data.audioBase64, data.audioMimeType || 'audio/mpeg');
          } else {
            pendingAudio[requestId] = { audioBase64: data.audioBase64, audioMimeType: data.audioMimeType || 'audio/mpeg' };
            setState('thinking', 'Voice is ready. Finishing answer');
          }
        } else {
          quickAudioFailed[requestId] = true;
          if (answerReady[requestId]) requestAnswerVoice(responseBox.textContent, requestId);
        }
      } catch (error) {
        logEvent('quick-audio-error', error.message);
        quickAudioFailed[requestId] = true;
        if (answerReady[requestId]) requestAnswerVoice(responseBox.textContent, requestId);
      }
    }

    async function requestAnswerVoice(reply, requestId) {
      if (muted) return;
      if (speakWithBrowserVoice(reply)) return;
      try {
        const response = await fetch(VOICE_AUDIO_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: reply, voice: 'alloy' })
        });
        const data = await response.json().catch(() => ({}));
        if (requestId !== currentRequestId || muted) return;
        if (response.ok && data.audioBase64) {
          playBase64(data.audioBase64, data.audioMimeType || 'audio/mpeg');
        } else {
          if (!speakWithBrowserVoice(reply)) {
            setState('', 'Answer is ready. Audio is temporarily unavailable.');
          }
        }
      } catch (error) {
        logEvent('answer-audio-error', error.message);
        if (requestId === currentRequestId && !speakWithBrowserVoice(reply)) {
          setState('', 'Answer is ready. Audio is temporarily unavailable.');
        }
      }
    }

    function cleanTextForSpeech(text) {
      return String(text || '')
        .replace(/```[\s\S]*?```/g, 'code example shown on screen')
        .replace(/[*_`#>~|{}[\]\\]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim()
        .slice(0, 900);
    }

    function speakWithBrowserVoice(text) {
      if (muted || !('speechSynthesis' in window) || !window.SpeechSynthesisUtterance) return false;
      const speechText = cleanTextForSpeech(text);
      if (!speechText) return false;
      try {
        stopPlayback();
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(speechText);
        utterance.lang = 'en-IN';
        utterance.rate = 0.9;
        utterance.pitch = 0.76;
        const voices = window.speechSynthesis.getVoices();
        const preferred = voices
          .map((voice) => {
            const name = voice.name.toLowerCase();
            const lang = voice.lang.toLowerCase();
            let score = 0;
            if (lang === 'en-in') score += 100;
            if (name.includes('india') || name.includes('indian')) score += 80;
            if (name.includes('male') || name.includes('ravi') || name.includes('hemant')) score += 40;
            if (name.includes('google') || name.includes('microsoft')) score += 15;
            return { voice, score };
          })
          .sort((a, b) => b.score - a.score)[0]?.voice;
        if (preferred) {
          utterance.voice = preferred;
          utterance.lang = preferred.lang || utterance.lang;
        }
        utterance.onstart = () => {
          isSpeaking = true;
          setState('speaking', 'Speaking...');
          updateButtons();
        };
        utterance.onend = utterance.onerror = () => {
          isSpeaking = false;
          setState('', 'Ready for the next question.');
          updateButtons();
        };
        setTimeout(() => window.speechSynthesis.speak(utterance), 80);
        return true;
      } catch (error) {
        logEvent('browser-speech-error', error.message);
        return false;
      }
    }

    function parseAnswer(reply) {
      const text = String(reply || '');
      const codeMatch = text.match(/```([\w+-]*)\n?([\s\S]*?)```/);
      if (!codeMatch) return { explanation: text.trim(), code: '', language: '' };
      return {
        explanation: text.replace(codeMatch[0], '').trim(),
        code: codeMatch[2].trim(),
        language: codeMatch[1] || ''
      };
    }

    function processReply(reply) {
      const parsed = parseAnswer(reply);
      responseBox.textContent = parsed.explanation || reply;
      lastReadableAnswer = parsed.explanation || reply;
      if (parsed.code) showSnippet(parsed.code, parsed.language);
    }

    function highlightCode(code) {
      return escapeHtml(code)
        .replace(/(\/\/.*)$/gm, '<span class="code-comment">$1</span>')
        .replace(/(&quot;.*?&quot;|'.*?')/g, '<span class="code-string">$1</span>')
        .replace(/\b(class|public|static|void|int|double|float|char|String|if|else|for|while|return|import|def|print|function|const|let|var|new)\b/g, '<span class="code-keyword">$1</span>')
        .replace(/\b(\d+)\b/g, '<span class="code-number">$1</span>');
    }

    function showSnippet(code, language) {
      const langText = language ? `<div class="code-meta">${escapeHtml(language.toUpperCase())}</div>` : '';
      view2.innerHTML = `<h2>Code Snippet</h2>${langText}<pre class="snippet"><code>${highlightCode(code)}</code></pre><button class="copyBtn" type="button">Copy Code</button>`;
      view2.querySelector('.copyBtn').onclick = () => navigator.clipboard.writeText(code).catch(() => {});
      view2.classList.add('active');
    }

    function cleanupView2() {
      view2.innerHTML = '';
      view2.classList.remove('active');
    }

    function playBase64(b64, mimeType) {
      stopPlayback();
      if (muted) return;
      audio = new Audio(`data:${mimeType || 'audio/mpeg'};base64,${b64}`);
      audio.preload = 'auto';
      isSpeaking = true;
      setState('speaking', 'Speaking...');
      updateButtons();
      audio.onended = () => {
        logEvent('audio-ended');
        isSpeaking = false;
        audio = null;
        setState('', 'Ready for the next question.');
        updateButtons();
      };
      audio.onerror = () => {
        logEvent('audio-error');
        isSpeaking = false;
        audio = null;
        setState('', 'Audio is temporarily unavailable. The answer is written above.');
        updateButtons();
      };
      audio.play().catch((error) => {
        logEvent('audio-play-blocked', error.message);
        isSpeaking = false;
        setState('', 'Tap again if the browser blocked audio. The answer is written above.');
        updateButtons();
      });
    }

    async function playGreetingOnce() {
      if (sessionStorage.getItem('sirGangulyGreetingPlayed') === 'true' || muted) return;
      sessionStorage.setItem('sirGangulyGreetingPlayed', 'true');
      responseBox.textContent = GREETING_TEXT;
      setState('thinking', 'Starting Sir Ganguly');
      logEvent('greeting-start');
      try {
        const response = await fetch(VOICE_AUDIO_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: GREETING_TEXT, voice: 'alloy' })
        });
        const data = await response.json().catch(() => ({}));
        if (data.audioBase64) {
          playBase64(data.audioBase64, data.audioMimeType || 'audio/mpeg');
        } else {
          setState('', 'Ready.');
        }
      } catch (error) {
        logEvent('greeting-error', error.message);
        setState('', 'Ready.');
      }
    }

    function stopPlayback() {
      if (audio) {
        try { audio.pause(); audio.currentTime = 0; } catch {}
        audio = null;
      }
      if ('speechSynthesis' in window) {
        try { window.speechSynthesis.cancel(); } catch {}
      }
      isSpeaking = false;
      updateButtons();
    }

    function stopCurrentAnswer() {
      if (answerController) {
        try { answerController.abort(); } catch {}
        answerController = null;
      }
    }

    function cleanup() {
      if (isListening && recognition) {
        try { recognition.stop(); } catch {}
      }
      stopCurrentAnswer();
      stopPlayback();
      setState('', 'Ready.');
      updateButtons();
    }

    function escapeHtml(str) {
      return (str || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    questionForm.addEventListener('submit', (event) => {
      event.preventDefault();
      askQuestion(questionInput.value);
    });

    talkBtn.addEventListener('click', () => {
      if (!recognition) {
        setState('', 'Microphone is not supported here. Please type your question.');
        return;
      }
      cleanup();
      try {
        recognition.start();
      } catch (error) {
        logEvent('microphone-start-error', error.message);
        setState('', 'Microphone is already starting. Please wait one moment.');
      }
    });

    stopBtn.addEventListener('click', cleanup);

    readAgainBtn.addEventListener('click', () => {
      const text = (lastReadableAnswer || responseBox.textContent || '').trim();
      if (!text) {
        setState('', 'No answer is ready to read yet.');
        return;
      }
      if (muted) {
        muted = false;
        localStorage.setItem('sirGangulyMuted', 'false');
      }
      const requestId = ++currentRequestId;
      setState('thinking', 'Preparing to read again');
      requestAnswerVoice(text, requestId);
      updateButtons();
    });

    muteBtn.addEventListener('click', () => {
      muted = !muted;
      localStorage.setItem('sirGangulyMuted', String(muted));
      if (muted) stopPlayback();
      setState('', muted ? 'Voice muted. Answers will still appear on screen.' : 'Voice unmuted.');
      updateButtons();
    });

    window.addEventListener('beforeunload', cleanup);
    initRecognition();
    updateButtons();
    window.addEventListener('load', () => {
      setTimeout(playGreetingOnce, 350);
    });
  </script>
</body>
</html>
