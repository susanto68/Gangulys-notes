<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Lab - Calculator</title>
  <link rel="stylesheet" href="../java-lab/lab.css">
  <link rel="stylesheet" href="lab.css">
</head>
<body>
  <div class="lab-container">
    <header>
      <h1>8) Simple Calculator</h1>
      <p>Add two numbers and display the result.</p>
      <a class="back-link" href="index.html">All Topics</a>
    </header>
    <div class="card editor">
      <div class="controls"><button id="runBtn" class="run-btn">Run Program</button></div>
      <label for="code">Python Code</label>
      <textarea id="code" class="code-area">a = 10
b = 20
sum = a + b
print("Sum:", sum)</textarea>
      <label for="stdin">Program Input (optional)</label>
      <textarea id="stdin" class="stdin-area" placeholder="Input passed to the program"></textarea>
      <label for="output">Output</label>
      <pre id="output" class="output"></pre>
    </div>
  </div>
  <script src="lab.js"></script>
</body>
</html>
