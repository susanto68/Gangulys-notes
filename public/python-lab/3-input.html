<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Lab - Input</title>
  <link rel="stylesheet" href="../java-lab/lab.css">
  <link rel="stylesheet" href="lab.css">
</head>
<body>
  <div class="lab-container">
    <header>
      <h1>3) Input</h1>
      <p>Read a name from input and print a welcome message.</p>
      <a class="back-link" href="index.html">All Topics</a>
    </header>
    <div class="card editor">
      <div class="controls"><button id="runBtn" class="run-btn">Run Program</button></div>
      <label for="code">Python Code</label>
      <textarea id="code" class="code-area">name = input("Enter your name: ")
print("Welcome,", name)</textarea>
      <label for="stdin">Program Input</label>
      <textarea id="stdin" class="stdin-area" placeholder="Type input here">Riya</textarea>
      <label for="output">Output</label>
      <pre id="output" class="output"></pre>
    </div>
  </div>
  <script src="lab.js"></script>
</body>
</html>
