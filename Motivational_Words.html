<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Udaan - उड़ान | A Flight Towards Your Dreams</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #89f7fe, #66a6ff);
      overflow: hidden;
      font-family: "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      border: 8px solid rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
      padding: 150px 16px 70px;
    }

    header {
      position: absolute;
      top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    #bird {
      position: absolute;
      top: 10px;
      left: 0;
      animation: birdfly 10s linear infinite;
      z-index: 2;
    }

    @keyframes birdfly {
      0% { left: -100px; top: 20px; }
      50% { left: 50vw; top: 10px; }
      100% { left: 110vw; top: 30px; }
    }

    header h1 {
      font-size: 1.6rem;
      background: rgba(255, 255, 255, 0.3);
      padding: 10px 24px;
      border-radius: 12px;
      backdrop-filter: blur(5px);
      color: #111;
      margin-top: 60px;
    }

    .motivator {
      padding: 34px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 25px;
      border: 4px double rgba(255, 255, 255, 0.5);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);
      z-index: 2;
      width: min(920px, 94vw);
    }

    .rainbow-text {
      font-size: 2.15rem;
      font-weight: bold;
      background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
      background-size: 400%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: rainbow 3s linear infinite;
    }

    @keyframes rainbow {
      0% { background-position: 0%; }
      100% { background-position: 100%; }
    }

    .hindi-text {
      margin-top: 15px;
      font-size: 1.55rem;
      color: #172554;
      font-family: "Noto Sans Devanagari", "Segoe UI", sans-serif;
      font-weight: 700;
    }

    .author {
      margin-top: 15px;
      font-size: 1.05rem;
      font-style: italic;
      color: #222;
      opacity: 0.82;
    }

    .voice-controls {
      margin-top: 22px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .voice-btn {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      background: linear-gradient(180deg, #1d4ed8, #0f2f86);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 800;
      cursor: pointer;
      box-shadow:
        0 7px 0 #0b1f5f,
        0 14px 22px rgba(15, 47, 134, 0.28),
        inset 0 2px 0 rgba(255,255,255,0.28);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .voice-btn:hover,
    .voice-btn:focus-visible {
      transform: translateY(-3px);
      box-shadow:
        0 10px 0 #0b1f5f,
        0 18px 28px rgba(15, 47, 134, 0.34),
        inset 0 2px 0 rgba(255,255,255,0.34);
    }

    .voice-btn:active {
      transform: translateY(5px);
      box-shadow:
        0 2px 0 #0b1f5f,
        0 8px 14px rgba(15, 47, 134, 0.26),
        inset 0 2px 0 rgba(255,255,255,0.2);
    }

    .voice-status {
      margin-top: 12px;
      color: #0b2f86;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.4;
      animation: float 8s infinite ease-in-out;
      mix-blend-mode: screen;
    }

    @keyframes float {
      from { transform: translateY(100vh) scale(1); }
      to { transform: translateY(-100vh) scale(1.4); }
    }

    .bubble1 { width: 60px; height: 60px; left: 10%; animation-duration: 7s; background: radial-gradient(circle, red, transparent); }
    .bubble2 { width: 40px; height: 40px; left: 25%; animation-duration: 5.5s; background: radial-gradient(circle, orange, transparent); }
    .bubble3 { width: 80px; height: 80px; left: 40%; animation-duration: 6.2s; background: radial-gradient(circle, yellow, transparent); }
    .bubble4 { width: 30px; height: 30px; left: 60%; animation-duration: 4.8s; background: radial-gradient(circle, green, transparent); }
    .bubble5 { width: 50px; height: 50px; left: 75%; animation-duration: 6.7s; background: radial-gradient(circle, blue, transparent); }
    .bubble6 { width: 35px; height: 35px; left: 85%; animation-duration: 5s; background: radial-gradient(circle, indigo, transparent); }
    .bubble7 { width: 55px; height: 55px; left: 5%; animation-duration: 7.2s; background: radial-gradient(circle, violet, transparent); }

    .music-info {
      position: absolute;
      bottom: 10px;
      font-size: 0.75rem;
      color: #333;
      background: rgba(255, 255, 255, 0.55);
      padding: 6px 10px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 5px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      z-index: 2;
    }

    .music-info img {
      width: 16px;
      height: 16px;
    }

    @media (max-width: 600px) {
      body {
        overflow-y: auto;
        justify-content: flex-start;
      }
      header h1 { font-size: 1.25rem; }
      .motivator { padding: 24px 16px; }
      .rainbow-text { font-size: 1.45rem; }
      .hindi-text { font-size: 1.1rem; }
      .author { font-size: 0.95rem; }
      .voice-btn { font-size: 0.84rem; padding: 9px 13px; }
      .voice-status { font-size: 0.78rem; }
    }
  </style>
    <!-- Sir Ganguly Unified Navigation System -->
    <link rel="stylesheet" href="sirganguly-nav.css?v=20260530-nav-v3">
    <script src="sirganguly-nav.js?v=20260530-nav-v3" defer></script>
</head>
<body>    
    <div id="sg-nav-root"></div>

  <div class="bubble bubble1"></div>
  <div class="bubble bubble2"></div>
  <div class="bubble bubble3"></div>
  <div class="bubble bubble4"></div>
  <div class="bubble bubble5"></div>
  <div class="bubble bubble6"></div>
  <div class="bubble bubble7"></div>

  <header>
    <svg id="bird" viewBox="0 0 100 100" width="80" height="80">
      <path d="M10 50 Q 40 10, 70 50 Q 40 30, 10 50" fill="none" stroke="#fff" stroke-width="2">
        <animateTransform attributeName="transform" attributeType="XML"
          type="translate"
          values="-100 0; 200 0"
          dur="6s"
          repeatCount="indefinite" />
      </path>
    </svg>
    <h1>
      <span style="font-weight: bold;">Udaan - उड़ान</span><br>
      <span style="font-size: 1rem; font-style: italic;">A Flight Towards Your Dreams</span>
    </h1>
  </header>

  <main class="motivator">
    <div id="quote" class="rainbow-text"></div>
    <div id="hindi" class="hindi-text"></div>
    <div id="author" class="author"></div>
    <div class="voice-controls">
      <button id="voiceBtn" class="voice-btn" type="button">Start Deep Voice Reading</button>
      <button id="stopVoiceBtn" class="voice-btn" type="button">Stop Voice</button>
    </div>
    <div id="voiceStatus" class="voice-status">Tap Start to hear English and Hindi lines.</div>
  </main>

  <div class="music-info">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png" alt="Music Icon">
    <span>Touch anywhere for music</span>
  </div>

  <audio id="bg-music" autoplay loop>
    <source src="https://cdn.pixabay.com/download/audio/2023/01/18/audio_c2b1e7e95e.mp3?filename=inspiration-126153.mp3" type="audio/mp3">
  </audio>

  <script>
    const quotes = [
      { en: "Believe in yourself. Every expert was once a beginner.", hi: "खुद पर विश्वास रखें। हर विशेषज्ञ कभी एक शुरुआत करने वाला था।", author: "Helen Hayes" },
      { en: "Dream big, work hard, and never give up.", hi: "बड़े सपने देखें, मेहनत करें, और कभी हार न मानें।", author: "Dwayne Johnson" },
      { en: "Your effort today is an investment in your tomorrow.", hi: "आपकी आज की मेहनत आपके कल में निवेश है।", author: "Unknown" },
      { en: "Do not wait for opportunity. Create it.", hi: "अवसर का इंतजार न करें। उसे खुद बनाएं।", author: "George Bernard Shaw" },
      { en: "Success means becoming better than you were yesterday.", hi: "सफलता का मतलब है कल से बेहतर बनना।", author: "APJ Abdul Kalam" },
      { en: "You are capable of amazing things. Just keep going.", hi: "आप अद्भुत चीजें कर सकते हैं। बस चलते रहें।", author: "Barack Obama" },
      { en: "Mistakes are proof that you are trying.", hi: "गलतियां यह साबित करती हैं कि आप प्रयास कर रहे हैं।", author: "Jennifer Lim" },
      { en: "Education is your superpower.", hi: "शिक्षा आपकी असली ताकत है।", author: "Malala Yousafzai" },
      { en: "The only limit is your own mindset.", hi: "एकमात्र सीमा आपकी सोच है।", author: "Napoleon Hill" },
      { en: "Be proud of how far you have come.", hi: "अब तक जो हासिल किया है उस पर गर्व करें।", author: "Michelle Obama" }
    ];

    let index = 0;
    let currentQuote = quotes[0];
    let voiceReadingEnabled = false;
    let quoteTimer = null;
    let nextVoiceTimer = null;
    let voices = [];
    const quoteEl = document.getElementById("quote");
    const hindiEl = document.getElementById("hindi");
    const authorEl = document.getElementById("author");
    const voiceBtn = document.getElementById("voiceBtn");
    const stopVoiceBtn = document.getElementById("stopVoiceBtn");
    const voiceStatus = document.getElementById("voiceStatus");

    function loadVoices() {
      voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
    }

    function findTeacherVoice(language) {
      const target = language.toLowerCase();
      const base = target.split("-")[0];

      function scoreVoice(voice) {
        const name = (voice.name || "").toLowerCase();
        const lang = (voice.lang || "").toLowerCase();
        let score = 0;

        if (lang === target) score += 80;
        if (lang.startsWith(base)) score += 45;
        if (/-in\b/.test(lang)) score += 35;
        if (name.includes("ravi")) score += 45;
        if (name.includes("heera")) score += 35;
        if (name.includes("google")) score += 22;
        if (name.includes("microsoft")) score += 18;
        if (name.includes("natural")) score += 18;
        if (name.includes("online")) score += 12;
        if (name.includes("india") || name.includes("indian")) score += 22;
        if (name.includes("hindi")) score += target.startsWith("hi") ? 28 : 8;
        if (name.includes("male")) score += 14;
        if (name.includes("female")) score -= 12;

        return score;
      }

      return voices
        .filter(voice => (voice.lang || "").toLowerCase().startsWith(base))
        .sort((a, b) => scoreVoice(b) - scoreVoice(a))[0] || null;
    }

    function speakLine(text, language, onEnd) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = language;
      utterance.rate = language.startsWith("hi") ? 0.78 : 0.82;
      utterance.pitch = language.startsWith("hi") ? 0.82 : 0.78;
      utterance.volume = 1;
      const voice = findTeacherVoice(language);
      if (voice) utterance.voice = voice;
      utterance.onend = () => {
        if (typeof onEnd === "function") onEnd();
      };
      utterance.onerror = () => {
        if (typeof onEnd === "function") onEnd();
      };
      window.speechSynthesis.speak(utterance);
    }

    function readCurrentQuote() {
      if (!voiceReadingEnabled || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      if (music && !music.paused) music.pause();
      const englishVoice = findTeacherVoice("en-IN") || findTeacherVoice("en");
      const hindiVoice = findTeacherVoice("hi-IN") || findTeacherVoice("hi");
      const voiceNames = [englishVoice, hindiVoice]
        .filter(Boolean)
        .map(voice => voice.name)
        .join(" and ");
      voiceStatus.textContent = hindiVoice
        ? `Reading with ${voiceNames || "the best available Indian voice"}...`
        : "Reading Hindi with the best available voice. For more realistic Hindi, install or enable a Hindi India voice.";
      speakLine(currentQuote.en, "en-IN", () => {
        if (!voiceReadingEnabled) return;
        speakLine(currentQuote.hi, "hi-IN", () => {
          if (!voiceReadingEnabled) return;
          voiceStatus.textContent = "Next motivational line is starting...";
          clearTimeout(nextVoiceTimer);
          nextVoiceTimer = setTimeout(showQuote, 500);
        });
      });
    }

    function showQuote() {
      currentQuote = quotes[index];
      quoteEl.textContent = currentQuote.en;
      hindiEl.textContent = currentQuote.hi;
      authorEl.textContent = `- ${currentQuote.author}`;
      index = (index + 1) % quotes.length;
      readCurrentQuote();
    }

    showQuote();
    quoteTimer = setInterval(showQuote, 6500);

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;

      voiceBtn.addEventListener("click", () => {
        loadVoices();
        voiceReadingEnabled = true;
        clearInterval(quoteTimer);
        clearTimeout(nextVoiceTimer);
        readCurrentQuote();
      });

      stopVoiceBtn.addEventListener("click", () => {
        voiceReadingEnabled = false;
        clearTimeout(nextVoiceTimer);
        window.speechSynthesis.cancel();
        clearInterval(quoteTimer);
        quoteTimer = setInterval(showQuote, 6500);
        if (music) tryPlay();
        voiceStatus.textContent = "Voice stopped. Tap Start to listen again.";
      });
    } else {
      voiceBtn.disabled = true;
      stopVoiceBtn.disabled = true;
      voiceStatus.textContent = "Voice reading is not supported in this browser.";
    }

    const music = document.getElementById("bg-music");
    const tryPlay = () => {
      music.play().catch(() => {
        document.body.addEventListener("click", () => music.play(), { once: true });
      });
    };
    window.addEventListener("load", tryPlay);
  </script>
</body>
</html>
